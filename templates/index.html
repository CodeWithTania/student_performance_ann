<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Performance Prediction</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🎓 Student Performance Prediction</h1>
    <p>Enter student details to predict result using ANN</p>

    <form method="POST">
        <input type="number" step="any" name="study_hours" placeholder="📚 Study hours per day" required>
        <input type="number" step="any" name="attendance" placeholder="🏫 Attendance (%)" required>
        <input type="number" step="any" name="previous_marks" placeholder="📝 Previous marks" required>

        <select name="assignments" required>
            <option value="">📂 Assignments submitted?</option>
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <button type="submit">🔍 Predict Result</button>
    </form>

    {% if prediction %}
        <div class="result">{{ prediction }}</div>
    {% endif %}
</div>

</body>
</html>
